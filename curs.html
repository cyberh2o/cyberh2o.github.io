<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curs — CiberH2O</title>
<link rel="icon" type="image/png" href="favicon.png">
<meta property="og:type" content="article">
<meta property="og:site_name" content="CiberH2O — Universitat de Girona">
<meta property="og:title" content="Formació en ciberseguretat hídrica — CiberH2O">
<meta property="og:description" content="Cursos oberts i gratuïts de ciberseguretat per al sector de l'aigua: NIS2, marc legal, OT i molt més. Càtedra de la Universitat de Girona.">
<meta property="og:image" content="https://cyberh2o.es/social.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="estil.css">
</head>
<body>

<nav>
  <div class="contenidor nav-inner">
    <a href="index.html" class="marca"><img src="logo.png" alt="" class="logo-img"><img src="logo-text.png" alt="Càtedra de Digitalització i Ciberseguretat Hídrica" class="logo-text-img"></a>
    <a class="tornar" id="tornar" href="index.html#formacio" style="margin-left:auto">←&nbsp;<span id="tornar-txt">Tota la formació</span></a>
    <div class="langs" role="group" aria-label="Idioma">
      <button data-lang="ca">CA</button>
      <button data-lang="es">ES</button>
      <button data-lang="en">EN</button>
    </div>
  </div>
</nav>

<header class="curs-hero">
  <div class="contenidor">
    <span class="pastilla" id="c-tipus"></span>
    <h1 id="c-titol"></h1>
    <p id="c-desc"></p>
    <span class="meta" id="c-meta"></span>
  </div>
</header>

<main class="cos-curs">
  <div class="contenidor" id="c-moduls"></div>
</main>

<footer>
  <div class="contenidor">
    <span>© 2026 Càtedra de Digitalització i Ciberseguretat Hídrica · Universitat de Girona</span>
    <span><a href="index.html">Inici</a> · <a href="legal.html">Avís legal i privacitat</a> · <a href="https://www.linkedin.com/in/c%C3%A0tedra-digitalitzaci%C3%B3-i-ciberseguretat-de-la-udg-729004420" target="_blank" rel="noopener">LinkedIn</a></span>
  </div>
</footer>

<script src="dades.js"></script>
<script>
const TC={
  ca:{tornar:'Tota la formació',moduls:'mòduls',video:'Curs en vídeo',pdf:'Curs en PDF',descarrega:'Descarrega el PDF',original:'Material original (PDF)',seguent:'Seg\u00fcent m\u00f2dul'},
  es:{tornar:'Toda la formación',moduls:'módulos',video:'Curso en vídeo',pdf:'Curso en PDF',descarrega:'Descarga el PDF',original:'Material original (PDF)',seguent:'Siguiente m\u00f3dulo'},
  en:{tornar:'All training',moduls:'modules',video:'Video course',pdf:'PDF course',descarrega:'Download PDF',original:'Original material (PDF)',seguent:'Next module'}
};
let LANG='ca';

function marcVideo(id,titol){
  const w=document.createElement('div');w.className='video-marc';
  w.innerHTML=`<img src="https://img.youtube.com/vi/${id}/hqdefault.jpg" alt="" loading="lazy">
    <button class="play" aria-label="${titol}"><span class="rodona">▶</span></button>`;
  w.querySelector('.play').addEventListener('click',()=>{
    w.innerHTML=`<iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1" title="${titol}" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
  });
  return w;
}

function render(){
  const hash=(location.hash.slice(1)||'').split('/');
  const c=CURSOS.find(x=>x.id===hash[0])||CURSOS[0];
  if(['ca','es','en'].includes(hash[1]))LANG=hash[1];
  const tc=TC[LANG];
  document.documentElement.lang=LANG;
  document.title=(c.nom[LANG]||c.nom.ca)+' — CiberH2O';
  document.getElementById('tornar-txt').textContent=tc.tornar;
  document.getElementById('c-tipus').textContent=c.tipus==='video'?tc.video:tc.pdf;
  document.getElementById('c-titol').textContent=c.nom[LANG]||c.nom.ca;
  document.getElementById('c-desc').textContent=c.desc[LANG]||c.desc.ca;
  document.getElementById('c-meta').textContent=c.moduls.length+' '+tc.moduls;
  document.querySelectorAll('.langs button').forEach(b=>{
    b.classList.toggle('actiu',b.dataset.lang===LANG);
    b.onclick=()=>{location.hash=c.id+'/'+b.dataset.lang;};
  });
  const cont=document.getElementById('c-moduls');
  cont.innerHTML='';
  const obre=(sec)=>{
    cont.querySelectorAll('.modul-pagina.obert').forEach(x=>x.classList.remove('obert'));
    sec.classList.add('obert');
    sec.scrollIntoView({behavior:'smooth',block:'start'});
  };
  c.moduls.forEach((m,i)=>{
    const sec=document.createElement('section');sec.className='modul-pagina'+(i===0?' obert':'');
    const h=document.createElement('h2');
    const mt=typeof m.t==='object'?(m.t[LANG]||m.t.ca):m.t;
    h.innerHTML=`<span class="num">${String(i+1).padStart(2,'0')}</span>${mt}${m.extra?` <span class="durada">· ${m.extra}</span>`:''}<span class="xevro">▾</span>`;
    h.addEventListener('click',()=>{sec.classList.contains('obert')?sec.classList.remove('obert'):obre(sec);});
    sec.appendChild(h);
    const cos=document.createElement('div');cos.className='modul-cos';
    if(m.contingut){
      const w=document.createElement('div');w.className='llico';
      w.innerHTML=m.contingut[LANG]||m.contingut.ca;
      cos.appendChild(w);
    }
    if(m.yt)cos.appendChild(marcVideo(m.yt,m.t));
    if(m.pdf){
      const l=document.createElement('div');l.className='pdf-linia';
      l.innerHTML=`<a class="boto-pdf" href="${m.pdf}" target="_blank" rel="noopener">⤓ ${m.contingut?tc.original:tc.descarrega}</a>`;
      cos.appendChild(l);
    }
    if(i<c.moduls.length-1){
      const seg=document.createElement('button');seg.className='boto-seguent';
      seg.textContent=tc.seguent+' →';
      seg.addEventListener('click',()=>{obre(sec.nextElementSibling);});
      cos.appendChild(document.createElement('br'));
      cos.appendChild(seg);
    }
    sec.appendChild(cos);
    cont.appendChild(sec);
  });
}
addEventListener('hashchange',render);
render();

/* Motor d'interactivitat de les lliçons (pestanyes, qüestionaris, targetes i escenaris) */
document.addEventListener('click',e=>{
  const fl=e.target.closest('.flip');
  if(fl){fl.classList.toggle('girada');return;}
  const eo=e.target.closest('.esc-opt');
  if(eo){
    const esc=eo.closest('.escenari');
    if(esc.classList.contains('resolt'))return;
    esc.classList.add('resolt');
    esc.querySelectorAll('.esc-opt').forEach(o=>{if(o.dataset.ok!==undefined)o.classList.add('ok')});
    if(eo.dataset.ok===undefined)eo.classList.add('mal');
    const fb=esc.querySelector('.esc-fb');
    if(fb&&eo.dataset.fb)fb.textContent=eo.dataset.fb;
    return;
  }
  const tb=e.target.closest('.tab-btn');
  if(tb){
    const tabs=tb.closest('.tabs');
    tabs.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('actiu',b===tb));
    tabs.querySelectorAll('.tab-panell').forEach(p=>p.classList.toggle('actiu',p.dataset.tab===tb.dataset.tab));
    return;
  }
  const qo=e.target.closest('.quiz-opt');
  if(qo){
    const preg=qo.closest('.quiz-preg');
    if(preg.classList.contains('resolt'))return;
    preg.classList.add('resolt');
    preg.querySelectorAll('.quiz-opt').forEach(o=>{if(o.dataset.ok!==undefined)o.classList.add('ok')});
    if(qo.dataset.ok===undefined)qo.classList.add('mal');else preg.classList.add('encert');
    const grup=preg.closest('.quiz-grup');
    if(grup && !grup.querySelector('.quiz-preg:not(.resolt)') && !grup.querySelector('.quiz-resultat')){
      const n=grup.querySelectorAll('.quiz-preg.encert').length;
      const tot=grup.querySelectorAll('.quiz-preg').length;
      const r=document.createElement('p');r.className='quiz-resultat';
      r.textContent=(grup.dataset.res||'{n} / {t}').replace('{n}',n).replace('{t}',tot);
      grup.appendChild(r);
    }
  }
});
</script>
</body>
</html>
